<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Stylish Portfolio - Leaflet Map</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <link href="https://cdnjs.cloudflare.com/ajax/libs/simple-line-icons/2.5.5/css/simple-line-icons.min.css" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700,300italic,400italic,700italic" rel="stylesheet" type="text/css" />
        <link href="css/styles.css" rel="stylesheet" />

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        
        <style>
            #map { height: 500px; width: 100%; border-radius: 10px; border: 2px solid #eeecf0; } 
            .popup-modal { border: none; border-radius: 8px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.2); width: 90%; max-width: 500px; }
            .popup-modal::backdrop { background: rgba(0,0,0,0.5); }
        </style>
    </head>
    <body id="page-top">
        <section class="content-section" id="contact">
            <div class="container px-4 px-lg-5 text-center">
                <h2 class="mb-4">Selecciona una ubicación</h2>
                <div id="map"></div> 
            </div>
        </section>

        <dialog class="popup popup-modal">
            <div class="text-start">
                <h4 class="mb-3">Guardar Coordenadas</h4>
                <div class="mb-2">
                    <label class="form-label">Nombre del lugar</label>
                    <input type="text" class="location form-control" placeholder="Ej: Mi casa">
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Latitud</label>
                        <input type="text" class="latitude form-control" readonly>
                    </div>
                    <div class="col">
                        <label class="form-label">Longitud</label>
                        <input type="text" class="longitude form-control" readonly>
                    </div>
                </div>
                <div class="mt-4 text-end">
                    <button class="btn btn-secondary Cancel">Cancelar</button>
                    <button class="btn btn-primary Save">Guardar en Supabase</button>
                </div>
            </div>
        </dialog>

        <footer class="footer text-center"></footer>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        
        <script src="js/myscripts.js"></script>
    </body>
</html>
